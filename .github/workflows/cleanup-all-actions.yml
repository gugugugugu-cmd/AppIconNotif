name: Cleanup All Actions Data

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete all artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let artifactPage = 1;
            let deletedArtifacts = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page: artifactPage
              });

              const artifacts = data.artifacts || [];
              if (artifacts.length === 0) break;

              for (const artifact of artifacts) {
                core.info(`Deleting artifact: ${artifact.name} (id: ${artifact.id})`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
                deletedArtifacts++;
              }

              artifactPage++;
            }

            core.info(`Deleted ${deletedArtifacts} artifacts.`);

      - name: Delete all workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let runPage = 1;
            let deletedRuns = 0;
            const currentRunId = context.runId;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page: runPage
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                if (run.id === currentRunId) {
                  core.info(`Skipping current run: ${run.id}`);
                  continue;
 core ${})`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
                deletedRuns++;
              }

              runPage++;
            }

            core.info(`Deleted ${deletedRuns} workflow runs.`);