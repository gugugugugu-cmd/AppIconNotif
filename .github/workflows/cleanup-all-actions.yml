name: Clean Android Build Artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'
  push:
    branches: [ "main", "master" ]
    paths:
      - '.github/workflows/clean-android-build.yml'

jobs:
  clean:
    name: Clean All Previous Android Builds
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Android build artifacts
        run: |
          echo "🧹 开始清理 Android 构建产物..."

          # 删除主要的构建目录
          rm -rf app/build
          rm -rf build
          rm -rf .gradle
          rm -rf app/.cxx
          rm -rf */build

          # 删除生成的 APK / AAB 文件
          rm -f *.apk *.aab
          rm -f app/build/outputs/apk/**/*.apk
          rm -f app/build/outputs/bundle/**/*.aab

          # 清理 Gradle 缓存
          rm -rf \~/.gradle/caches
          rm -rf \~/.gradle/wrapper

          echo "✅ Android 构建产物清理完成。"

      - name: Commit and push cleanup changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: clean previous Android build artifacts"
          commit_options: '--no-verify'
          file_pattern: '.'
          branch: ${{ github.ref_name }}