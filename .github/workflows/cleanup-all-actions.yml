name: Cleanup All Actions Data

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete all artifacts and workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let deletedArtifacts = 0;
            let deletedRuns = 0;

            // 删除所有 artifacts
            let artifactPage = 1;
            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page: artifactPage
              });

              const artifacts = data.artifacts || [];
              if (artifacts.length === 0 break.info(`} await,
 }

Page }.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page: runPage
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                // 跳过当前正在执行的这一次，避免自删
                if (run.id === context.runId) {
                  core.info(`Skipping current run: ${run.name} (id: ${run.id})`);
                  continue;
                }

                core.info(`Deleting workflow run: ${run.name} (id: ${run.id})`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
                deletedRuns++;
              }

              runPage++;
            }

            core.info(`Done. Deleted ${deletedArtifacts} artifacts and ${deletedRuns} workflow runs.`);