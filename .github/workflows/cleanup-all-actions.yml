name: Clean Android Build Artifacts

on:
  workflow_dispatch:                    # 手动触发（推荐）
  schedule:
 
   push:
    branches: [ "main", "master" ]
    paths:
      - '.github/workflows/clean-android-build.yml'   # 仅此文件改动时触发

jobs:
  clean:
    name: Clean All Previous Android Builds
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 需要此权限才能提交清理后的改动

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Android build artifacts
        run: |
          echo "🧹 开始清理 Android 构建产物..."

          # 删除最主要的构建目录
          rm -rf app/build
          rm -rf build
          rm -rf .gradle
          rm -rf app/.cxx          # NDK 相关缓存
          rm -rf */build           # 删除所有模块的 build 目录

          # 清理常见临时文件和缓存
          rm -f *.apk *.aab
          rm -f app/build/outputs/apk/**/*.apk
          rm -f app/build/outputs/bundle/**/*.aab

          # 清理 Gradle 缓存（可选，但推荐定期清理）
          rm -rf \~/.gradle/caches
          rm -rf \~/.gradle/wrapper

          echo "✅ Android 构建产物清理完成。"

      - name: Commit and push cleanup changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: clean previous Android build artifacts"
          commit_options: '--no-verify'
          file_pattern: '.'
          branch: ${{ github.ref_name }}
          skip_dirty_check: false