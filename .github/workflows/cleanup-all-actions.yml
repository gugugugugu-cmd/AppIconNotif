name: Clean Android Build Artifacts

on:
  workflow_dispatch:   # 主要通过手动触发清理

jobs:
  clean:
    name: Clean All Previous Android Builds
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean Android build artifacts
        id: cleanup
        run: |
          echo "🧹 开始清理 Android 构建产物..."

          # 彻底清理所有常见的构建目录和缓存
          rm -rf app/build
          rm -rf build
          rm -rf .gradle
          rm -rf app/.cxx
          rm -rf */build
          rm -rf \~/.gradle/caches
          rm -rf \~/.gradle/wrapper

          # 删除生成的 APK / AAB 文件
          rm -f *.apk *.aab
          rm -f app/build/outputs/apk/**/*.apk
          rm -f app/build/outputs/bundle/**/*.aab

          # 检查是否有实际变化
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到文件变化，将提交清理结果。"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有需要清理的文件，跳过 commit。"
          fi

      - name: Commit and push cleanup changes
        if: steps.cleanup.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: clean previous Android build artifacts"
          commit_options: '--no-verify'
          file_pattern: '.'
          branch: ${{ github.ref_name }}